<div class="landing">
    <div class="card">
        <h1 class="title">You're Invited 💌</h1>
        <p class="subtitle">Enter your invitation code</p>
        <input class="invite-input"
               type="text"
               [value]="code()"
               (input)="onInput($event)"/>

        @if (error()) {
            <p class="error">{{ error() }}</p>
        }
        <button class="btn btn-primary"
                [disabled]="!code().trim() || loading()"
                (click)="submit()">
            @if (loading()) {
                Checking...
            } @else {
                Continue
            }
        </button>
    </div>
</div>
