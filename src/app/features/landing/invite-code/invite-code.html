<div class="landing" [ngStyle]="backgroundStyle">
    <div class="card">
        <h1 class="title">Isang Paanyaya! 💌</h1>
        <p class="subtitle">itala ang iyong invitation code</p>
        <input class="invite-input"
               type="text"
               [value]="code()"
               (input)="onInput($event)"/>

        @if (error()) {
            <p class="error">{{ error() }}</p>
        }
        <button class="btn btn-primary"
                [disabled]="!code().trim() || loading()"
                (click)="submit()">
            @if (loading()) {
              Inihahanda ang iyong paanyaya...
            } @else {
              Magpatuloy
            }
        </button>
    </div>
</div>
