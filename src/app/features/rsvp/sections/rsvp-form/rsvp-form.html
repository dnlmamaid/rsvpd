<form [formGroup]="form" (ngSubmit)="submit()" class="form">
    <h2 class="font-serif">RSVP</h2>

    <input type="text" formControlName="name" placeholder="Your Name" />

    <input type="email" formControlName="email" placeholder="Your Email" />

    <label>
        <input type="checkbox" formControlName="attending" />
        Will you attend?
    </label>

    <input
            type="number"
            formControlName="guests"
            placeholder="Number of Guests"
    />

    <textarea
            formControlName="message"
            placeholder="Message (optional)"
    ></textarea>

    <!-- Honeypot -->
    <input type="text" formControlName="honeypot" hidden />

    <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Sending...' : 'Submit RSVP' }}
    </button>

    @if(success()){
        <p>✅ Thank you for your response!</p>
    }
    @else {
        <p>{{ error() }}</p>
    }
</form>
